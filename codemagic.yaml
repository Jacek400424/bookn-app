workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bookn
    environment:
      groups:
        - code-signing
      vars:
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        BUNDLE_ID: com.booknbuddy.app
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CM_CERTIFICATE_PRIVATE_KEY"
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up profiles
        script: xcode-project use-profiles
      - name: Test build verbose
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -config Release \
            -archivePath build/ios/App.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | grep -E "error:|warning:.*Push|warning:.*provision|ARCHIVE"
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - code-signing
      vars:
        PACKAGE_NAME: com.booknbuddy.app
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease
      - name: Sign Android release
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore /tmp/keystore.jks \
            -storepass $CM_KEYSTORE_PASSWORD \
            -keypass $CM_KEYSTORE_PASSWORD \
            android/app/build/outputs/bundle/release/app-release.aab \
            $CM_KEY_ALIAS
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
