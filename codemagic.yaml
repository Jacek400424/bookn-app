workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bookn
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.booknbuddy.app
      vars:
        XCODE_SCHEME: App
        XCODE_PROJECT: ios/App/App.xcodeproj
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.booknbuddy.app --type IOS_APP_STORE --create
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect certificates list --type IOS_DISTRIBUTION --save
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
