workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bookn
    environment:
      vars:
        XCODE_SCHEME: App
        XCODE_PROJECT: ios/App/App.xcodeproj
        BUNDLE_ID: com.booknbuddy.app
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key="$CM_CERTIFICATE_PRIVATE_KEY" \
            --save
          app-store-connect profiles list \
            --bundle-id "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key="$CM_CERTIFICATE_PRIVATE_KEY" \
            --create \
            --save
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up profiles
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
